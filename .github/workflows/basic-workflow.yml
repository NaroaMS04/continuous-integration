name: Continuous integration example (Parametrizado)

on: 
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]
        java: [ '11', '17', '21' ]
    
    name: Java ${{ matrix.java }} on ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # 'adopt' está marcado como legacy, 'temurin' es el estándar actual
          java-version: ${{ matrix.java }}

      - name: Run tests
        run: mvn test